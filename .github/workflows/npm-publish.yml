name: Publish to npm

on:
  push:
    tags:
      - 'pkgmap-v*'

permissions:
  contents: read

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish package from GitHub release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier check
        run: npm run format:check

      - name: Verify version sync
        run: npm run release:check

      - name: Smoke test CLI help
        run: node bin/pkgmap.js --help

      - name: Verify release tag matches package version
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_NAME="${{ github.ref_name }}"
          TAG_VERSION="${TAG_NAME#pkgmap-v}"

          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Release tag $TAG_NAME does not match package version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
