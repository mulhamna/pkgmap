name: Publish to npm

on:
  release:
    types:
      - published

permissions:
  contents: read

concurrency:
  group: publish-${{ github.workflow }}-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish package from GitHub release
    runs-on: ubuntu-latest
    if: github.event.release.target_commitish == 'main'

    steps:
      - name: Checkout
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608

      - name: Setup Node.js
        uses: actions/setup-node@42375524e23c412d93f7b1ac14db8eea7ca3f10a
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier check
        run: npm run format:check

      - name: Verify version sync
        run: npm run release:check

      - name: Smoke test CLI help
        run: node bin/pkgmap.js --help

      - name: Verify release tag matches package version
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_NAME="${GITHUB_REF_NAME#v}"

          if [ "$PACKAGE_VERSION" != "$TAG_NAME" ]; then
            echo "Release tag v$TAG_NAME does not match package version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
