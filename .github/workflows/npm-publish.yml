name: Publish to npm

on:
  push:
    branches:
      - main

jobs:
  publish:
    name: Publish package when version changes
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check package version against npm
        id: version_check
        shell: bash
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          REMOTE_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null || true)

          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "local_version=$LOCAL_VERSION" >> "$GITHUB_OUTPUT"
          echo "remote_version=$REMOTE_VERSION" >> "$GITHUB_OUTPUT"

          if [ "$LOCAL_VERSION" = "$REMOTE_VERSION" ]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Version $LOCAL_VERSION already exists on npm, skipping publish."
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "New version detected: local=$LOCAL_VERSION remote=${REMOTE_VERSION:-none}"
          fi

      - name: Publish to npm
        if: steps.version_check.outputs.should_publish == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish summary
        shell: bash
        run: |
          if [ "${{ steps.version_check.outputs.should_publish }}" = "true" ]; then
            echo "Published ${{ steps.version_check.outputs.package_name }}@${{ steps.version_check.outputs.local_version }} to npm."
          else
            echo "Skipped publish for ${{ steps.version_check.outputs.package_name }} because version ${{ steps.version_check.outputs.local_version }} is already on npm."
          fi
