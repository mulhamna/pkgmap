name: Publish to npm

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish package from GitHub release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier check
        run: npm run format:check

      - name: Verify version sync
        run: npm run release:check

      - name: Smoke test CLI help
        run: node bin/pkgmap.js --help

      - name: Publish to npm (skip if already published)
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view @mulham28/pkgmap@$PACKAGE_VERSION version 2>/dev/null || true)

          if [ "$PUBLISHED" = "$PACKAGE_VERSION" ]; then
            echo "Version $PACKAGE_VERSION already on npm, skipping publish."
            exit 0
          fi

          echo "Publishing version $PACKAGE_VERSION..."
          npm publish --access public
