name: Publish to npm

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to publish from"
        required: false
        default: main
      tag_name:
        description: "Release tag name (for validation)"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: publish-${{ github.workflow }}-${{ github.event.release.tag_name || github.event.inputs.tag_name || github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish package from GitHub release
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.ref == 'main'

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.inputs.ref || github.event.release.target_commitish || github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier check
        run: npm run format:check

      - name: Verify version sync
        run: npm run release:check

      - name: Smoke test CLI help
        run: node bin/pkgmap.js --help

      - name: Verify release tag matches package version
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_NAME="${{ github.event.inputs.tag_name || github.event.release.tag_name }}"
          TAG_VERSION="${TAG_NAME#pkgmap-v}"

          if [ -z "$TAG_NAME" ]; then
            echo "Missing release tag name for validation"
            exit 1
          fi

          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Release tag $TAG_NAME does not match package version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
