name: Publish to npm

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish package from GitHub release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier check
        run: npm run format:check

      - name: Verify version sync
        run: npm run release:check

      - name: Smoke test CLI help
        run: node bin/pkgmap.js --help

      - name: Publish only for release-version commits
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          VERSION_IN_SRC=$(node -e "import('./src/version.js').then(m => console.log(m.APP_VERSION))")

          if [ "$PACKAGE_VERSION" != "$VERSION_IN_SRC" ]; then
            echo "Skipping publish because package.json=$PACKAGE_VERSION and src/version.js=$VERSION_IN_SRC are not synced"
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
