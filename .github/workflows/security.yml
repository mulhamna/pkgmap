name: Security

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: '17 3 * * 1'

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608

      - name: Setup Node.js
        uses: actions/setup-node@42375524e23c412d93f7b1ac14db8eea7ca3f10a
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608

      - name: Initialize CodeQL
        uses: github/codeql-action/init@b7f0bc2601ef573122a161f7c2d1fc6cb8e0e03c
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@b7f0bc2601ef573122a161f7c2d1fc6cb8e0e03c

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@b7f0bc2601ef573122a161f7c2d1fc6cb8e0e03c
