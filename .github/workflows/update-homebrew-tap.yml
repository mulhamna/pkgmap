name: Update Homebrew Tap

on:
  workflow_run:
    workflows: ["Publish to npm"]
    types: [completed]

permissions:
  contents: read

jobs:
  update-tap:
    name: Bump pkgmap formula in homebrew-tap
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout pkgmap
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: main

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Compute npm tarball sha256
        id: sha
        run: |
          VERSION=${{ steps.pkg.outputs.version }}
          URL="https://registry.npmjs.org/@mulham28/pkgmap/-/pkgmap-${VERSION}.tgz"

          # Retry up to 5x — npm CDN may lag slightly after publish
          SHA=""
          for i in $(seq 1 5); do
            if curl -fsSL "$URL" -o /tmp/pkgmap.tgz 2>/dev/null; then
              SHA=$(sha256sum /tmp/pkgmap.tgz | awk '{print $1}')
              break
            fi
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done

          if [ -z "$SHA" ]; then
            echo "Failed to download tarball from $URL"
            exit 1
          fi

          echo "sha256=$SHA" >> $GITHUB_OUTPUT

      - name: Checkout homebrew-tap
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: mulhamna/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          VERSION=${{ steps.pkg.outputs.version }}
          SHA=${{ steps.sha.outputs.sha256 }}
          FORMULA="homebrew-tap/Formula/pkgmap.rb"

          python3 - <<EOF
          import re

          with open("$FORMULA") as f:
              content = f.read()

          content = re.sub(
              r'url "https://registry\.npmjs\.org/@mulham28/pkgmap/-/pkgmap-[^"]+"',
              'url "https://registry.npmjs.org/@mulham28/pkgmap/-/pkgmap-$VERSION.tgz"',
              content,
          )
          content = re.sub(
              r'sha256 "[a-f0-9]+"',
              'sha256 "$SHA"',
              content,
          )

          with open("$FORMULA", "w") as f:
              f.write(content)

          print("Updated formula to v$VERSION ($SHA)")
          EOF

      - name: Commit and push
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/pkgmap.rb
          git diff --staged --quiet && echo "No changes, skipping." && exit 0
          git commit -m "chore: bump pkgmap to v${{ steps.pkg.outputs.version }}"
          git push
